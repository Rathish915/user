<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f2f2f2;
}

.container{
    width:350px;
    background:#fff;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.container h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    background:#007BFF;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0056b3;
}
</style>

<script src="https://forminit.com/f/3tx2fxkd3su"></script>
</head>

<body>

<div class="container">
    <h2>Login</h2>

    <form id="myForm">
        <input type="text" name="fi-text-box1" placeholder="Enter Value 1" required>
        <input type="text" name="fi-text-box2" placeholder="Enter Value 2" required>

        <button type="submit">Submit</button>
    </form>

    <p id="status"></p>
</div>

<script>
const forminit = new Forminit();

document.getElementById("myForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const formData = new FormData(e.target);

    const { error } = await forminit.submit("3tx2fxkd3su", formData);

    if (error) {
        document.getElementById("status").innerHTML = error.message;
    } else {
        document.getElementById("status").innerHTML = "Submitted Successfully!";
        e.target.reset();
    }
});
</script>

</body>
</html>
